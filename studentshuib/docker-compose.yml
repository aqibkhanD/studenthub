# ============================================================
#  StudentsHub — Docker Compose Stack
#  Services: Nginx, PHP-FPM (Laravel), PostgreSQL, Redis,
#            Next.js Frontend, Queue Worker, Scheduler
#  AI service is behind --profile ai flag (Phase 5+)
# ============================================================

services:

  # ----------------------------------------------------------
  # Nginx — reverse proxy (API + frontend)
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: sh_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - frontend
    networks:
      - sh_network

  # ----------------------------------------------------------
  # Next.js Frontend
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api/v1
    container_name: sh_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api/v1
    networks:
      - sh_network
    depends_on:
      - php

  # ----------------------------------------------------------
  # PHP-FPM — Laravel application
  # IMPORTANT: build context is the PROJECT ROOT so the
  # Dockerfile can COPY both backend/ and docker/ directories.
  # ----------------------------------------------------------
  php:
    build:
      context: .                          # <-- project root, not ./docker/php
      dockerfile: docker/php/Dockerfile
    container_name: sh_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - sh_storage:/var/www/html/storage/app
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-studentshuib}
      - DB_USERNAME=${DB_USERNAME:-sh_user}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_HOST=${MAIL_HOST:-mailpit}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - MAIL_USERNAME=${MAIL_USERNAME:-null}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-null}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-null}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@diu.edu.bd}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-StudentsHub DIU}
      - SMS_GATEWAY_URL=${SMS_GATEWAY_URL:-}
      - SMS_GATEWAY_KEY=${SMS_GATEWAY_KEY:-}
      - FILESYSTEM_DISK=local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sh_network

  # ----------------------------------------------------------
  # Laravel Queue Worker
  # ----------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sh_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --no-ansi
    volumes:
      - ./backend:/var/www/html
      - sh_storage:/var/www/html/storage/app
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-studentshuib}
      - DB_USERNAME=${DB_USERNAME:-sh_user}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_HOST=${MAIL_HOST:-mailpit}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@diu.edu.bd}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-StudentsHub DIU}
      - SMS_GATEWAY_URL=${SMS_GATEWAY_URL:-}
      - SMS_GATEWAY_KEY=${SMS_GATEWAY_KEY:-}
      - FILESYSTEM_DISK=local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sh_network

  # ----------------------------------------------------------
  # Laravel Scheduler (SLA monitor every 15 minutes)
  # ----------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sh_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    # Runs artisan schedule:run every 60 seconds
    command: sh -c "while true; do php artisan schedule:run --no-ansi; sleep 60; done"
    volumes:
      - ./backend:/var/www/html
      - sh_storage:/var/www/html/storage/app    # access uploaded files (SLA processing)
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-studentshuib}
      - DB_USERNAME=${DB_USERNAME:-sh_user}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_HOST=${MAIL_HOST:-mailpit}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@diu.edu.bd}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-StudentsHub DIU}
      - SMS_GATEWAY_URL=${SMS_GATEWAY_URL:-}
      - SMS_GATEWAY_KEY=${SMS_GATEWAY_KEY:-}
      - FILESYSTEM_DISK=local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sh_network

  # ----------------------------------------------------------
  # PostgreSQL 16 with pgvector extension
  # ----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sh_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"       # expose for local dev tools (TablePlus, DBeaver, etc.)
    environment:
      POSTGRES_DB:       ${DB_DATABASE:-studentshuib}
      POSTGRES_USER:     ${DB_USERNAME:-sh_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - sh_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sh_user} -d ${DB_DATABASE:-studentshuib}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sh_network

  # ----------------------------------------------------------
  # Redis 7 — queue, cache, sessions
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sh_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - sh_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sh_network

  # ----------------------------------------------------------
  # Mailpit — local email catcher (dev only)
  # View captured emails at http://localhost:8025
  # ----------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: sh_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"     # web UI
      - "1025:1025"     # SMTP
    networks:
      - sh_network
    profiles:
      - dev             # only starts with: docker compose --profile dev up

  # ----------------------------------------------------------
  # FastAPI AI Service (Phase 5+)
  # ----------------------------------------------------------
  ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: sh_ai
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USERNAME:-sh_user}:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/${DB_DATABASE:-studentshuib}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./ai-service:/app
    depends_on:
      - postgres
      - redis
    networks:
      - sh_network
    profiles:
      - ai              # only starts with: docker compose --profile ai up

# ----------------------------------------------------------
# Named volumes
# ----------------------------------------------------------
volumes:
  sh_pgdata:
  sh_redis_data:
  sh_storage:         # shared upload storage across php + queue containers

# ----------------------------------------------------------
# Network
# ----------------------------------------------------------
networks:
  sh_network:
    driver: bridge
